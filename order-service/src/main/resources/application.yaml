spring:
  application:
    name: order-service
  main:
    # Defer all bean creation (DataSource, Flyway, Redis, Kafka) until first use.
    # Remove this once the infrastructure is available in docker-compose.
    lazy-initialization: false
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/ecommerce_orders
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Use 'validate' once DB is running; 'none' lets service start without a database.
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          "[batch_size]": 50
        "[order_inserts]": true
        "[order_updates]": true
  flyway:
    # Enable once the database is running in docker-compose (Week 4+).
    enabled: false
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        "[spring.json.trusted.packages]": "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

server:
  port: 8082

product-service:
  url: ${PRODUCT_SERVICE_URL:http://product-service:8081}
